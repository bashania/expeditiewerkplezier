<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mobiele preview — Expeditie Werkplezier</title>
<style>
  :root{ --bg:#e9eceb; --ink:#2E5555; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Mulish,sans-serif;
    background:radial-gradient(120% 80% at 50% 0%, #f4efee 0%, #e3e8e7 100%);
    color:var(--ink);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:32px 16px 56px;
  }
  .bar{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    justify-content:center; margin-bottom:26px; text-align:center;
  }
  .bar h1{ font-size:16px; font-weight:700; margin:0; letter-spacing:-.01em; }
  .bar p{ margin:0; font-size:13px; color:#5C5C64; }
  .controls{ display:flex; gap:8px; }
  .controls button{
    font:inherit; font-size:13px; font-weight:600; cursor:pointer;
    border:1px solid #cfd6d5; background:#fff; color:var(--ink);
    padding:7px 14px; border-radius:999px; transition:all .15s ease;
  }
  .controls button:hover{ border-color:var(--ink); }
  .controls button.is-active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  /* Phone bezel */
  .phone{
    position:relative;
    width:var(--w,390px);
    height:844px;
    max-height:calc(100vh - 150px);
    background:#0e1413;
    border-radius:46px;
    padding:13px;
    box-shadow:0 30px 70px -20px rgba(30,60,58,.5), 0 0 0 2px rgba(255,255,255,.5) inset;
    transition:width .25s cubic-bezier(.16,1,.3,1);
  }
  .phone__screen{
    position:relative;
    width:100%; height:100%;
    background:#fff;
    border-radius:34px;
    overflow:hidden;
  }
  .phone__notch{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:140px; height:26px; background:#0e1413;
    border-bottom-left-radius:16px; border-bottom-right-radius:16px;
    z-index:3;
  }
  iframe{
    border:0; width:100%; height:100%; display:block; background:#fff;
  }
  .hint{ margin-top:22px; font-size:12.5px; color:#7a7f86; text-align:center; max-width:330px; line-height:1.5; }
  .hint a{ color:var(--ink); }
</style>
</head>
<body>
  <div class="bar">
    <div>
      <h1>Mobiele preview — Expeditie Werkplezier</h1>
      <p>De site in een echte telefoonbreedte, los van je vensterbreedte.</p>
    </div>
    <div class="controls">
      <button data-w="390" class="is-active">iPhone · 390px</button>
      <button data-w="360">Android · 360px</button>
      <button data-w="768">Tablet · 768px</button>
    </div>
  </div>

  <div class="phone" id="phone">
    <div class="phone__notch"></div>
    <div class="phone__screen">
      <iframe id="frame" src="index.html" title="Mobiele weergave"></iframe>
    </div>
  </div>

  <p class="hint">Tip: scroll binnen het scherm. Wissel hierboven van apparaatbreedte. Onder 860px schakelt de site naar de mobiele lay-out.</p>

  <script>
    const phone = document.getElementById('phone');
    const btns = document.querySelectorAll('.controls button');
    btns.forEach(b => b.addEventListener('click', () => {
      btns.forEach(x => x.classList.remove('is-active'));
      b.classList.add('is-active');
      phone.style.setProperty('--w', b.dataset.w + 'px');
    }));
  </script>
</body>
</html>
